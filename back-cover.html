<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Cases — Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5efe6;
      --warm-dark: #1a1410;
      --accent: #c8956a;
      --accent-light: #e8c4a0;
      --glass: rgba(255,255,255,0.08);
      --text-muted: #8a7b6e;
      --card-bg: #ffffff;
    }

    * {
      padding: 0; margin: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── NOISE TEXTURE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ─── BACK BUTTON ─── */
    .back-btn {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px 10px 14px;
      background: var(--warm-dark);
      color: var(--accent-light);
      border: none;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(26,20,16,0.25);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .back-btn svg {
      width: 16px; height: 16px;
      transition: transform 0.3s ease;
    }

    .back-btn:hover {
      background: var(--accent);
      color: #fff;
      transform: translateX(-3px) scale(1.03);
      box-shadow: 0 6px 28px rgba(200,149,106,0.4);
    }

    .back-btn:hover svg { transform: translateX(-3px); }

    /* ─── HERO HEADER ─── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 120px 40px 60px;
    }

    .hero-label {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
      padding: 6px 16px;
      border: 1px solid var(--accent-light);
      border-radius: 50px;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 300;
      color: var(--warm-dark);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      max-width: 420px;
      margin-inline: auto;
      line-height: 1.7;
    }

    .hero-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 30px auto 0;
    }

    /* ─── FILTER PILLS ─── */
    .filter-bar {
      position: relative; z-index: 1;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 40px 50px;
    }

    .pill {
      padding: 8px 20px;
      border: 1.5px solid rgba(26,20,16,0.15);
      border-radius: 50px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .pill:hover, .pill.active {
      background: var(--warm-dark);
      border-color: var(--warm-dark);
      color: var(--accent-light);
    }

    /* ─── CARD GRID ─── */
    .cases-section {
      position: relative; z-index: 1;
      padding: 0 40px 100px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Varied sizing for editorial feel */
    .card:nth-child(1) { grid-row: span 2; }
    .card:nth-child(7) { grid-row: span 2; }

    /* ─── CARD ─── */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 2px 12px rgba(26,20,16,0.08);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.4s ease;

      /* LAZY LOAD: initial hidden state */
      opacity: 0;
      transform: translateY(40px);
    }

    .card.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.015);
      box-shadow: 0 20px 50px rgba(26,20,16,0.18), 0 0 0 1px rgba(200,149,106,0.2);
      z-index: 2;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 260px;
    }

    .card img {
      width: 100%;
      height: 100%;
      min-height: 260px;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      /* skeleton shimmer */
      background: linear-gradient(90deg, #ede5d8 25%, #f5ede0 50%, #ede5d8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .card img.loaded { animation: none; background: none; }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .card:hover img { transform: scale(1.08); }

    /* ─── CARD OVERLAY ─── */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,20,16,0.75) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.35s ease;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      border-radius: 20px;
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-label {
      color: #fff;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transform: translateY(8px);
      transition: transform 0.35s ease;
    }

    .card:hover .card-label { transform: translateY(0); }

    .view-icon {
      position: absolute;
      top: 14px; right: 14px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card:hover .view-icon {
      opacity: 1;
      transform: scale(1);
    }

    .view-icon svg { width: 16px; height: 16px; color: var(--warm-dark); }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lb-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(12, 8, 5, 0.7);
      backdrop-filter: blur(18px) saturate(0.8);
      -webkit-backdrop-filter: blur(18px) saturate(0.8);
    }

    .lb-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 20px;
    }

    .lb-img-wrap {
      position: relative;
      max-width: min(480px, 80vw);
      max-height: 80vh;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
      transform: scale(0.85);
      transition: transform 0.45s cubic-bezier(0.34, 1.26, 0.64, 1);
    }

    .lightbox.open .lb-img-wrap { transform: scale(1); }

    .lb-img-wrap img {
      width: 100%;
      max-height: 80vh;
      object-fit: cover;
      display: block;
    }

    /* Navigation arrows */
    .lb-nav {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      flex-shrink: 0;
      color: #fff;
    }

    .lb-nav:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .lb-nav svg { width: 20px; height: 20px; }

    /* Close button */
    .lb-close {
      position: absolute;
      top: -16px; right: -16px;
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(200,149,106,0.5);
    }

    .lb-close:hover { background: #fff; color: var(--warm-dark); transform: rotate(90deg) scale(1.1); }
    .lb-close svg { width: 18px; height: 18px; }

    /* ─── COUNT BADGE ─── */
    .lb-count {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .card:nth-child(1), .card:nth-child(7) { grid-row: span 1; }
    }

    @media (max-width: 540px) {
      .card-grid { grid-template-columns: 1fr; padding: 0; gap: 16px; }
      .hero { padding: 90px 24px 50px; }
      .cases-section { padding: 0 20px 80px; }
      .lb-nav { display: none; }
    }

    /* ─── SCROLL COUNT ─── */
    .item-count {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding-bottom: 30px;
      position: relative; z-index: 1;
    }
  </style>
</head>

  <script>
    // ── LAZY LOAD (IntersectionObserver) ──
    const cards = document.querySelectorAll('.card');
    const images = document.querySelectorAll('img[data-src]');

    // Image observer — load images when near viewport
    const imgObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const img = e.target;
          img.src = img.dataset.src;
          img.onload = () => img.classList.add('loaded');
          imgObserver.unobserve(img);
        }
      });
    }, { rootMargin: '100px' });

    images.forEach(img => imgObserver.observe(img));

    // Card reveal observer — staggered entrance
    const cardObserver = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          const card = e.target;
          const idx = Array.from(cards).indexOf(card);
          setTimeout(() => card.classList.add('revealed'), (idx % 3) * 80);
          cardObserver.unobserve(card);
        }
      });
    }, { threshold: 0.08 });

    cards.forEach(card => cardObserver.observe(card));

    // ── LIGHTBOX ──
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCount = document.getElementById('lbCount');
    const allImgs = [...document.querySelectorAll('.card img')];
    let current = 0;

    function openLightbox(idx) {
      current = idx;
      const src = allImgs[idx].dataset.src || allImgs[idx].src;
      lbImg.src = src;
      lbImg.alt = allImgs[idx].alt;
      lbCount.textContent = `${idx + 1} / ${allImgs.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + allImgs.length) % allImgs.length;
      const src = allImgs[current].dataset.src || allImgs[current].src;
      lbImg.style.opacity = '0';
      lbImg.style.transform = `translateX(${dir > 0 ? '30px' : '-30px'})`;
      setTimeout(() => {
        lbImg.src = src;
        lbImg.alt = allImgs[current].alt;
        lbCount.textContent = `${current + 1} / ${allImgs.length}`;
        lbImg.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        lbImg.style.opacity = '1';
        lbImg.style.transform = 'translateX(0)';
      }, 150);
    }

    // Click cards to open
    cards.forEach((card, i) => {
      card.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbBackdrop').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', (e) => { e.stopPropagation(); navigate(-1); });
    document.getElementById('lbNext').addEventListener('click', (e) => { e.stopPropagation(); navigate(1); });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    // Touch/swipe support
    let touchStart = 0;
    lightbox.addEventListener('touchstart', e => { touchStart = e.touches[0].clientX; });
    lightbox.addEventListener('touchend', e => {
      const diff = touchStart - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    });

    // Filter pills (visual only — adapt to your data)
    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
      });
    });
  </script>
</body>
</html>
