<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Headphones — 2026 Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/headphone.css">

<body>

  <!-- Back Button -->
  <a href="#" class="back-btn" onclick="history.back(); return false;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </a>

  <!-- Hero -->
  <div class="hero">
    <span class="hero-label">2026 Collection</span>
    <h1>Head<em>phones</em></h1>
    <p class="hero-sub">Premium over-ear and in-ear headphones engineered for audiophiles and everyday listeners alike.</p>
    <div class="hero-line"></div>
  </div>

  <!-- Video Section -->
  <div class="video-section">
    <span class="video-label">Experience the sound</span>
    <div class="video-wrap">
      <video id="promo-video" autoplay muted loop playsinline >
        <source src="assets/images/headphones/promo-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="video-placeholder" id="video-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
      
      </div>
      <span class="video-badge">New Drop</span>
    </div>
  </div>

  <!-- Filter Pills -->
  <div class="filter-bar">
    <button class="pill active" data-filter="All">All</button>
    <button class="pill" data-filter="Over-Ear">Over-Ear</button>
    <button class="pill" data-filter="In-Ear">In-Ear</button>
    <button class="pill" data-filter="Wireless">Wireless</button>
    <button class="pill" data-filter="Studio">Studio</button>
  </div>

          </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lb-backdrop" id="lbBackdrop"></div>
    <div class="lb-content">
      <button class="lb-nav" id="lbPrev" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="lb-img-wrap">
        <button class="lb-close" id="lbClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <img id="lbImg" src="" alt="">
        <div class="lb-info">
          <span class="lb-name" id="lbName"></span>
          <span class="lb-count" id="lbCount"></span>
        </div>
      </div>
      <button class="lb-nav" id="lbNext" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
